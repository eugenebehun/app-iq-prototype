/* Tiny inline brand tile (used for the colored agent thumbnails in the sidebar) */
function Tile({ bg, children }) {
  return (
    <span style={{
      width: 20, height: 20, borderRadius: 4, background: bg,
      display: "inline-flex", alignItems: "center", justifyContent: "center",
      color: "#fff", fontSize: 11, fontWeight: 700, flex: "none",
    }}>
      {children}
    </span>
  );
}

/* Source brand swatch (small colored circle with a letter or icon) */
function SourceSwatch({ bg, fg = "#fff", children, title }) {
  return (
    <Tooltip content={title || ""} relationship="label">
      <span style={{
        width: 24, height: 24, borderRadius: "50%",
        background: bg, color: fg,
        display: "inline-flex", alignItems: "center", justifyContent: "center",
        fontSize: 11, fontWeight: 700,
        cursor: "pointer",
      }}>{children}</span>
    </Tooltip>
  );
}

            <div className={s.sbHeader}>
              <span className={s.sbTitle}>M365 Copilot</span>
              <Button appearance="subtle" size="small" icon={<IC.PanelLeftContract16Regular />} aria-label="Collapse" />
            </div>
            <div className={s.sbLink}>
              <IC.Chat20Regular />
              <span>New chat</span>
            </div>
            <div className={s.sbSection}>Agents</div>
            <div className={s.agentRow}>
              <AgentIcon id="researcher" />Researcher
            </div>
            <div className={s.agentRow}>
              <AgentIcon id="analyst" />Analyst
            </div>
            <div className={mergeClasses(s.agentRow, s.agentRowActive)}>
              <AgentIcon id="cowork" />Cowork (Frontier)
            </div>
            <div className={s.agentRow}>
              <AgentIcon id="employee" />Employee Self-Service
            </div>
            <div className={s.agentRow}>
              <AgentIcon id="coach" />Career Coach
            </div>
            <div className={mergeClasses(s.sbLink, s.agentRowMuted)}><span style={{ width: 20 }} />All agents</div>
            <div style={{
              marginTop: 6, height: 32, border: `1px solid ${tokens.colorNeutralStroke1}`,
              borderRadius: tokens.borderRadiusMedium, display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 13, fontWeight: 600, cursor: "pointer",
            }}>Create agent</div>

            <div className={s.sbSection}>
              <span>Chats</span>
              <IC.Search16Regular />
            </div>
            {[
              "California State Sales Pipeline Re…",
              "San Francisco State Sales Pipelin…",
              "Sales Pipeline Report Guidelines …",
              "Document on Steps to Start MC…",
              "Clarifying Scope Naming for MC…",
              "Interpreting the Meaning of an I…",
              "Clarifying Eugene's Early Lead M…",
              "Understanding Manager's UPN i…",
              "Summary of Team Scenarios and…",
              "No Scenario Documents Found i…",
              "Review and Improvement Sugge…",
              "Clarification Request for Typo M…",
              "Microsoft Paternity Leave Policy …",
              "Feature Comparison of BizChat, I…",
              "Venn Diagram of Office Skills Int…",
              "Microsoft Ignite 2025 Event Ove…",
              "can you find presentation that re…",
              "GOLDEN Approach for Precise A…",
            ].map((c, i) => <div key={i} className={s.chatRow}>{c}</div>)}
            <div className={mergeClasses(s.sbLink, s.agentRowMuted)}><IC.MoreHorizontal16Regular />All chats</div>
          </aside>

          {/* center column */}
          <section className={s.centerCol}>
            {/* agent header */}
            <div className={s.agentHeader}>
              <div className={s.agentHeaderLeft}>
                <span className={s.agentBadge}><CoworkMark size={20} /></span>
                <span className={s.agentHeaderTitle}>Cowork</span>
              </div>
              <div className={s.agentHeaderRight}>
                <Dropdown size="small" defaultValue="Auto" defaultSelectedOptions={["auto"]} style={{ minWidth: 80 }}>
                  <Option value="auto">Auto</Option>
                  <Option value="gpt4">GPT-4</Option>
                  <Option value="gpt55">GPT-5.5</Option>
                </Dropdown>
                <Tooltip content="Notifications" relationship="label">
                  <Button appearance="subtle" icon={<IC.Alert20Regular />} aria-label="Notifications" />
                </Tooltip>
                <Tooltip content="More" relationship="label">
                  <Button appearance="subtle" icon={<IC.MoreHorizontal20Regular />} aria-label="More" />
                </Tooltip>
              </div>
            </div>

            {/* preview banner */}
            <div className={s.banner}>
              <IC.Info20Regular style={{ color: tokens.colorBrandForeground1 }} />
              <span>
                Hi there — we're running a research preview of OpenAI GPT-5.5 inside Microsoft
                and your feedback will help shape the product. Get the details on the research preview{" "}
                <Link href="#">More info</Link>
              </span>
              <Button appearance="subtle" icon={<IC.Dismiss16Regular />} aria-label="Dismiss"
                      style={{ marginLeft: "auto" }} />
            </div>

            {/* hero */}
            <div className={s.hero}>
              <div className={s.heroInner}>
                <div className={s.heroTitle}>What should we tackle next?</div>

                {/* chat input + plus popover */}
                <div style={{ width: "100%", position: "relative" }}>
                  <Popover
                    open={plusMode !== null}
                    onOpenChange={(_, d) => { if (!d.open) setPlusMode(null); }}
                    positioning={{ position: "below", align: "start", offset: 6 }}
                    withArrow={false}
                  >
                    <div className={s.inputBox}>
                      <PopoverTrigger disableButtonEnhancement>
                        <Button
                          appearance="subtle"
                          shape="circular"
                          icon={<IC.Add20Regular />}
                          onClick={() => setPlusMode((m) => m === null ? "menu" : null)}
                          aria-label="Attach or manage plugins"
                        />
                      </PopoverTrigger>
                      <span className={s.inputPlaceholder}>How can I help you today?</span>
                      <Tooltip content="Compose" relationship="label">
                        <Button appearance="subtle" icon={<IC.Pen20Regular />} aria-label="Compose" />
                      </Tooltip>
                      <Tooltip content="Voice" relationship="label">
                        <Button appearance="subtle" icon={<IC.Mic20Regular />} aria-label="Voice" />
                      </Tooltip>
                    </div>

                    <PopoverSurface
                      className={plusMode === "plugins" ? s.pluginsSurface : s.plusSurface}
                    >
                      {plusMode === "menu" && (
                        <>
                          <PlusMenuItem
                            icon={<IC.DocumentText20Regular />}
                            title="Add work context"
                            sub="Files, people, meetings"
                          />
                          <PlusMenuItem
                            icon={<IC.ArrowUpload20Regular />}
                            title="Upload images and files"
                            sub="PDF, Word, Excel, images"
                          />
                          <PlusMenuItem
                            icon={<IC.Cloud20Regular />}
                            title="Attach cloud files"
                            sub="OneDrive, SharePoint, Teams"
                          />
                          <PlusMenuItem
                            icon={<IC.PuzzlePiece20Regular />}
                            title="Manage plugins"
                            sub="Turn plugins on or off, browse the marketplace"
                            onClick={() => setPlusMode("plugins")}
                          />
                        </>
                      )}
                      {plusMode === "plugins" && (
                        <PluginsPanel
                          pluginState={pluginState}
                          setPluginState={setPluginState}
                          enabledCount={enabledCount}
                          onBrowse={() => { setPlusMode(null); setBrowseOpen(true); }}
                        />
                      )}
                    </PopoverSurface>
                  </Popover>
                </div>

                {/* suggestion cards */}
                <div className={s.cardRow}>
                  <SuggCard title="Organize my inbox" art={<CardArt id="inbox" />} />
                  <SuggCard title="Arrange my week" art={<CardArt id="week" />} />
                  <SuggCard title="Prep for a meeting" art={<CardArt id="prep" />} />
                  <SuggCard title="Research a company" art={<CardArt id="research" />} />
                </div>
              </div>
            </div>
          </section>

        </div>

        {/* Browse plugins dialog */}
        <BrowsePluginsDialog
          open={browseOpen}
          onOpenChange={setBrowseOpen}
          installed={pluginState}
          onInstall={(id, val) => setPluginState((p) => ({ ...p, [id]: val }))}
        />
      </div>
    </FluentProvider>
  );
}

function PlusMenuItem({ icon, title, sub, onClick }) {
  const s = useCWStyles();
  return (
    <div className={s.plusItem} onClick={onClick} role="button" tabIndex={0}>
      <span className={s.plusItemIcon}>{icon}</span>
      <span className={s.plusItemText}>
        <span className={s.plusItemTitle}>{title}</span>
        <span className={s.plusItemSub}>{sub}</span>
      </span>
    </div>
  );
}

function PluginsPanel({ pluginState, setPluginState, enabledCount, onBrowse }) {
  const s = useCWStyles();
  const rows = PLUGIN_CATALOG.filter((p) => p.id in pluginState);
  return (
    <>
      <Input
        className={s.pluginsSearch}
        size="medium"
        contentBefore={<IC.Search16Regular />}
        placeholder="Search plugins"
      />
      <div className={s.pluginsCount}>{enabledCount} plugins are on</div>
      {rows.map((p) => (
        <div key={p.id} className={s.pluginRow}>
          <div className={s.pluginRowLeft}>
            <PluginLogo id={p.id} bg={p.bg} short={p.short} />
            <span style={{ fontSize: 13 }}>{p.name}</span>
          </div>
          <Switch
            checked={!!pluginState[p.id]}
            onChange={(_, d) => setPluginState((s2) => ({ ...s2, [p.id]: d.checked }))}
          />
        </div>
      ))}
      <Divider style={{ margin: "4px 0" }} />
      <div className={s.browseRow} onClick={onBrowse} role="button" tabIndex={0}>
        <IC.MoreHorizontal16Regular />
        <span>Browse plugins</span>
      </div>
    </>
  );
}

function BrowsePluginsDialog({ open, onOpenChange, installed, onInstall }) {
  const s = useCWStyles();
  const [tab, setTab] = React.useState("discover");
  const items = tab === "discover"
    ? PLUGIN_CATALOG
    : PLUGIN_CATALOG.filter((p) => installed[p.id]);
  return (
    <Dialog open={open} onOpenChange={(_, d) => onOpenChange(d.open)} modalType="modal">
      <DialogSurface className={s.browseSurface}>
        <DialogBody>
          <DialogTitle
            action={
              <Button
                appearance="subtle"
                icon={<IC.Dismiss20Regular />}
                aria-label="Close"
                onClick={() => onOpenChange(false)}
              />
            }
          >
            Browse plugins
          </DialogTitle>
          <DialogContent>
            <div className={s.browseDesc}>
              Expand what Cowork can do with prebuilt workflows powered by Plugins.
              Tailor plugins to connect with your organization's tools, data sources,
              and best practices.
            </div>

            <div className={s.browseTabsRow}>
              <TabList selectedValue={tab} onTabSelect={(_, d) => setTab(d.value)}>
                <Tab value="discover">Discover</Tab>
                <Tab value="myplugins">My plugins</Tab>
              </TabList>
              <Input
                contentBefore={<IC.Search16Regular />}
                placeholder="Search for plugins"
                style={{ width: 240 }}
              />
            </div>

            <div className={s.browseGrid}>
              {items.map((p) => (
                <div key={p.id} className={s.pluginCard}>
                  <span className={s.pluginCardIcon} style={{ background: p.bg, color: p.fg || "#fff" }}>{p.short}</span>
                  <div>
                    <div className={s.pluginCardTitle}>
                      {p.name}
                      {p.verified && (
                        <IC.CheckmarkCircle16Filled style={{ color: "#10b981" }} aria-label="Verified" />
                      )}
                      {p.warn && (
                        <IC.Warning16Filled style={{ color: "#f59e0b" }} aria-label="Untrusted" />
                      )}
                    </div>
                    <div className={s.pluginCardDesc}>{p.desc}</div>
                  </div>
                </div>
              ))}
            </div>
          </DialogContent>
        </DialogBody>
      </DialogSurface>
    </Dialog>
  );
}

/* Suggestion card with simple inline art */

  const s = useCWStyles();
  return (
    <div className={s.suggCard}>
      <div className={s.suggTitle}>{title}</div>
      <div className={s.suggArt}>{art}</div>
    </div>
  );
}

          <Button appearance="subtle" icon={<CSMark size={22} />} aria-label="App launcher" />

      </MenuTrigger>
      <MenuPopover>
        <MenuList>
          <MenuItem icon={<Ic n="WindowApps20Regular" />} onClick={() => onSwitchView("copilot-studio")}>
            Copilot Studio
          </MenuItem>
          <MenuItem icon={<Ic n="Sparkle20Regular" />} onClick={() => onSwitchView("copilot-studio-v2")}>
            Copilot Studio v2
          </MenuItem>
          <MenuItem icon={<Ic n="BotSparkle20Regular" />} onClick={() => onSwitchView("agent-builder")}>
            Agent Builder
          </MenuItem>
          <MenuItem icon={<Ic n="PeopleTeam20Regular" />} onClick={() => onSwitchView("cowork")}>
            CoWork

          <MenuItem icon={<Ic n="Apps20Regular" />} onClick={() => onSwitchView("power-platform")}>
            Power Platform
          </MenuItem>
        </MenuList>
      </MenuPopover>
    </Menu>
  );
}

function PanelRow({ title, desc, active, disabled, onAdd }) {
  const s = useV2Styles();
  return (
    <div
      className={mergeClasses(s.row, active && s.rowActive, disabled && s.rowDisabled)}
      onClick={disabled ? undefined : onAdd}
      role={onAdd ? "button" : undefined}
      tabIndex={onAdd && !disabled ? 0 : undefined}
    >
      <div>
        <div className={s.rowTitle}>{title}</div>
        <div className={s.rowDesc}>{desc}</div>
      </div>
      <span className={s.rowAdd}>
        <Button
          appearance="subtle"
          size="small"
          icon={<Ic n="Add20Regular" />}
          aria-label={"Add " + title}
          disabled={disabled}
          onClick={(e) => { e.stopPropagation(); if (onAdd) onAdd(); }}
        />
      </span>
    </div>
  );
}

function IQProviderRow({ mark, name, preview, desc, toggle }) {
  const s = useV2Styles();
  const [on, setOn] = React.useState(false);
  return (
    <div className={s.provRow}>
      <span className={s.provIcon}>{mark}</span>
      <div className={s.provText}>
        <div className={s.provName}>
          {name}
          {preview && <Badge appearance="tint" color="informative" size="small">Preview</Badge>}
        </div>
        <div className={s.provDesc}>{desc}</div>
      </div>
      {toggle
        ? <Switch checked={on} onChange={(_, d) => setOn(d.checked)} />
        : <Button className={s.provAdd}>Add</Button>}
    </div>
  );
}

function AddMicrosoftIQDialog({ open, onOpenChange }) {
  const s = useV2Styles();
  return (
    <Dialog open={open} onOpenChange={(_, d) => onOpenChange(d.open)} modalType="modal">
      <DialogSurface className={s.iqDialog}>
        <DialogBody>
          <DialogTitle
            action={
              <Button
                appearance="subtle"
                icon={<Ic n="Dismiss20Regular" />}
                aria-label="Close"
                onClick={() => onOpenChange(false)}
              />
            }
          >
            Add Microsoft IQ
          </DialogTitle>
          <DialogContent>
            <div className={s.iqDialogDesc}>
              Connect work signals, trusted org knowledge, and business data so the agent can
              understand, reason, and act.
            </div>
            <IQProviderRow
              mark={<AppIQMark />}
              name="App IQ"

// React Context holding every demo-only flag the UI exposes. Keeping these
// in one place lets the global "Design preview" drawer be the only surface
// where they're exposed; no inline dropdowns on user-facing pages.
const DesignContext = React.createContext(null);
const useDesignState = () => React.useContext(DesignContext);

const DESIGN_DEFAULTS = {
  // Hub Home — single layout now, with action-feed content variants.
  homeFeed: "default",            // default | empty (no action items) | fresh (no apps)
  // App-wide blocking state.
  dvBlocked: false,
  // Domain Model — Level 1 + Level 2 states.
  modelsListState: "populated",   // populated | empty | loading | error | noDV | noPermission
  domainState: "populated",       // populated | empty | loading | error | noPermission
  configTableError: false,
  configTableFatalError: false,
  glossaryState: "populated",     // populated | empty | loading | error
};

function AppIQContent() {
  const s = useIQStyles();
  const [screen, setScreen] = React.useState("hub-home");
  const [apps, setApps] = React.useState(SEED_APPS);
  const [currentAppId, setCurrentAppId] = React.useState(null);
  const [appTab, setAppTab] = React.useState("overview");
  const [showEmpty, setShowEmpty] = React.useState(false);
  const [designState, setDesignStateRaw] = React.useState(DESIGN_DEFAULTS);
  const [designOpen, setDesignOpen] = React.useState(false);
  const setDesignState = (patch) => setDesignStateRaw((prev) => ({ ...prev, ...patch }));

  const currentApp = apps.find((a) => a.id === currentAppId);

  const goHome = () => {
    setScreen("hub-home");
    setCurrentAppId(null);
  };

  const openApp = (id) => {
    setCurrentAppId(id);
    setAppTab("overview");
    setScreen("app-detail");
  };

  const startWizard = (starterId) => {
    setScreen("wizard");
  };

  // Brand-new entry path: "Create from scratch" goes to a conversational
  // surface rather than the source-app-inspection wizard.
  const startScratch = () => {
    setScreen("create-scratch");
  };

  const finishWizard = (newApp) => {
    setApps((prev) => [newApp, ...prev]);
    setCurrentAppId(newApp.id);
    setAppTab("overview");
    setScreen("app-detail");
  };

  // Surface ID used by the Design preview drawer to filter controls.
  const currentSurface = screen === "hub-home" ? "home"
    : screen === "wizard" ? "wizard"
    : screen === "create-scratch" ? "create-scratch"
    : screen === "hub-settings" ? "hub-settings"
    : appTab === "domain" ? "domain"
    : appTab;

  return (
    <DesignContext.Provider value={{ designState, setDesignState }}>
    <div className={s.root}>
      <TopChrome
        screen={screen}
        currentApp={currentApp}
        onGoHome={goHome}
        onOpenSettings={() => setScreen("hub-settings")}
        onOpenDesign={() => setDesignOpen(true)}
        designActive={designState.dvBlocked || Object.entries(designState).some(([k, v]) => k !== "dvBlocked" && v !== DESIGN_DEFAULTS[k])}
      />
      {designOpen && (
        <DesignPreviewDrawer
          surface={currentSurface}
          designState={designState}
          setDesignState={setDesignState}
          onClose={() => setDesignOpen(false)}
          onReset={() => setDesignStateRaw(DESIGN_DEFAULTS)}
        />
      )}
      {screen === "hub-home" && (
        <HubHome
          apps={apps}
          onCreate={() => startWizard()}
          onCreateScratch={startScratch}
          onPickStarter={(s) => startWizard(s)}
          onOpenApp={openApp}
        />
      )}
      {screen === "create-scratch" && (
        <ConversationalCreation
          onCancel={goHome}
          onFinish={finishWizard}
        />
      )}
      {screen === "wizard" && (
        <CreateWizard
          onCancel={goHome}
          onFinish={finishWizard}
        />
      )}
      {screen === "app-detail" && currentApp && (
        <AppDetail
          app={currentApp}
          tab={appTab}
          setTab={setAppTab}
          onChangeStage={(newStage) =>
            setApps((prev) => prev.map((a) => a.id === currentApp.id ? { ...a, stage: newStage } : a))
          }
        />
      )}
      {screen === "hub-settings" && <HubSettings onBack={goHome} />}
    </div>
    </DesignContext.Provider>
  );
}

                </span>

  return (
    <div className={s.homeBody}>
      {dvBlocked && (
        <div style={{
          display: "flex", alignItems: "center", gap: 12,
          padding: "12px 20px",
          background: "linear-gradient(90deg, #fef6e7 0%, #fef3da 100%)",
          border: `1px solid ${tokens.colorPaletteYellowBorderActive}`,
          borderRadius: tokens.borderRadiusLarge,
          marginBottom: 16,

            <div style={{ fontSize: 13, fontWeight: tokens.fontWeightSemibold, color: tokens.colorNeutralForeground1 }}>
              Dataverse Intelligence is off in this environment.
            </div>

            Request access

      <Hero />

      {!isEmpty && <Portfolio />}

/* ============================================================
   CONVERSATIONAL CREATION — "Create from scratch"  (v3.2.12)
   ============================================================
   Agent Builder–style two-column layout per Eugene's brand note:
     Left  — stepped conversation (chat bubbles + step heading + composer)
     Right — live preview of the App IQ app as it builds up
             (Name, Description, Skills, Semantic model, Glossary, Tools).

   Top bar: breadcrumb (← Hub · Create from scratch) +
            step indicator (1 · 2 · 3 · 4) + Create button (enabled at step 4).

   Steps (state machine):
     1. Purpose      → captures Name + one-line description
     2. Capabilities → captures Skills list
     3. Data sources → captures Semantic-model tables + Glossary + Tools
     4. Review       → maker confirms; app is created
   ============================================================ */
const SCRATCH_STEPS = [
  { n: 1, label: "Purpose"      },
  { n: 2, label: "Capabilities" },
  { n: 3, label: "Data"         },
  { n: 4, label: "Review"       },
];

function ConversationalCreation({ onCancel, onFinish }) {
  // Synthesized app draft that the right pane visualizes. Sections start empty
  // and fill in as the maker answers each step's question.
  const [draftApp, setDraftApp] = React.useState({
    name: "",
    description: "",
    skills: [],
    tables: [],
    glossary: [],
    tools: [],
  });
  const [step, setStep] = React.useState(1);
  const [turns, setTurns] = React.useState([
    {
      from: "agent",
      text: "Hey — let's build an App IQ app from scratch. We'll move through four short steps. First: tell me what this app is for. What does your team do, and what's the problem you want it to solve?",
    },
  ]);
  const [draft, setDraft] = React.useState("");
  const bodyRef = React.useRef(null);
  React.useEffect(() => {
    if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
  }, [turns]);

  /* ---- Demo synthesis: each step's free-text answer is mapped to a plausible
         app structure so reviewers see the right pane fill up. Real product
         would have an LLM driving this. ---- */
  const sendMaker = (text) => {
    if (!text.trim()) return;
    const nextTurns = [...turns, { from: "maker", text }];

    if (step === 1) {
      // Purpose → name + description
      setDraftApp((d) => ({
        ...d,
        name: "Loan Triage Assistant",
        description: "Triages incoming loan applications by risk, routes Red Files to the risk committee, and drafts approval letters for green deals.",
      }));
      nextTurns.push({
        from: "agent",
        text: "Got it — sounds like a loan-triage assistant. I've named it provisionally on the right; rename anytime. Step 2: what should it actually do? List the capabilities in plain language — e.g. \"evaluate loan applications, route risky deals, generate approval letters.\"",
      });
      setStep(2);
    } else if (step === 2) {
      // Capabilities → skills
      setDraftApp((d) => ({
        ...d,
        skills: [
          { name: "Evaluate Loan Application", desc: "Underwrites a loan against the credit policy" },
          { name: "Route Red File",            desc: "Routes risky loans to the risk committee" },
          { name: "Generate Approval Letter",  desc: "Renders the approval letter for a closed loan" },
        ],
      }));
      nextTurns.push({
        from: "agent",
        text: "Good. I've drafted three skills on the right. Step 3: what should it know about? You can mention Dataverse tables (e.g. Loans, Borrowers), documents (policy PDFs), or APIs — or just describe it.",
      });
      setStep(3);
    } else if (step === 3) {
      // Data sources → tables, glossary, tools
      setDraftApp((d) => ({
        ...d,
        tables:   ["Loans", "Borrowers", "Collateral", "Payments"],
        glossary: [
          { term: "Red File",      desc: "A loan flagged for risk committee review." },
          { term: "Appraisal gap", desc: "The delta between requested LTV and supportable LTV." },
        ],
        tools: [
          { name: "Dataverse",                 kind: "PP connector" },
          { name: "Credit Bureau API",         kind: "MCP server"   },
          { name: "Document Generation",       kind: "PA flow"      },
          { name: "Zava Capital Credit Policy.docx", kind: "Document" },
        ],
      }));
      nextTurns.push({
        from: "agent",
        text: "Filled in your semantic model, a glossary, and the tools your skills will probably need. Take a look on the right — when it looks right, hit Create up top.",
      });
      setStep(4);
    }
    setTurns(nextTurns);
    setDraft("");
  };

  const create = () => {
    const id = "scratch-" + Date.now();
    onFinish({
      id,
      name: draftApp.name,
      sourceApp: "From scratch",
      owner: "Eugene Behun",
      ownerInitials: "EB",
      stage: "Draft",
      skills: draftApp.skills.length,
      lastActivity: "just now",
      listings: [],
      version: "v0.1.0",
    });
  };

  const reset = () => {
    setDraftApp({ name: "", description: "", skills: [], tables: [], glossary: [], tools: [] });
    setStep(1);
    setTurns([turns[0]]);
    setDraft("");
  };

  return (
    <div style={{
      backgroundColor: tokens.colorNeutralBackground2,
      // Lock to the viewport minus the top app chrome so the composer
      // is always pinned to the bottom of the left column.
      height: "calc(100vh - 48px)",
      overflow: "hidden",
      display: "grid",
      gridTemplateRows: "56px 1fr",
    }}>
      {/* === Top breadcrumb bar === */}
      <div style={{
        display: "grid",
        gridTemplateColumns: "auto auto 1fr auto",
        alignItems: "center",
        gap: 12,
        paddingLeft: 16, paddingRight: 16,
        backgroundColor: tokens.colorNeutralBackground1,
        borderBottom: `1px solid ${tokens.colorNeutralStroke2}`,
      }}>
        <Button appearance="subtle" icon={<A.ArrowLeft16Regular />} onClick={onCancel} style={{ color: "#742774" }}>
          Hub
        </Button>
        <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 13, color: tokens.colorNeutralForeground2 }}>
          <A.ChevronRight12Regular style={{ color: tokens.colorNeutralForeground4 }} />
          <span style={{ fontWeight: tokens.fontWeightSemibold, color: tokens.colorNeutralForeground1 }}>
            Create from scratch
          </span>
          {draftApp.name && (
            <>
              <A.ChevronRight12Regular style={{ color: tokens.colorNeutralForeground4 }} />
              <span style={{ color: tokens.colorNeutralForeground2 }}>{draftApp.name}</span>
            </>
          )}
        </div>
        {/* Step indicator — centered */}
        <div style={{ display: "flex", justifyContent: "center" }}>
          <div style={{ display: "inline-flex", alignItems: "center", gap: 8 }}>
            {SCRATCH_STEPS.map((st, i) => {
              const active = step === st.n;
              const done   = step > st.n;
              return (
                <React.Fragment key={st.n}>
                  <div style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
                    <span style={{
                      width: 22, height: 22, borderRadius: "50%",
                      backgroundColor: done ? tokens.colorPaletteGreenBackground2
                                       : active ? "#742774"
                                       : tokens.colorNeutralBackground3,
                      color: done ? tokens.colorPaletteGreenForeground2
                           : active ? "#fff"
                           : tokens.colorNeutralForeground3,
                      display: "inline-flex", alignItems: "center", justifyContent: "center",
                      fontSize: 11, fontWeight: tokens.fontWeightSemibold,
                    }}>
                      {done ? <A.Checkmark12Regular /> : st.n}
                    </span>
                    <span style={{
                      fontSize: 12,
                      fontWeight: active ? tokens.fontWeightSemibold : tokens.fontWeightRegular,
                      color: active ? tokens.colorNeutralForeground1 : tokens.colorNeutralForeground3,
                    }}>
                      {st.label}
                    </span>
                  </div>
                  {i < SCRATCH_STEPS.length - 1 && (
                    <span style={{ width: 16, height: 1, backgroundColor: tokens.colorNeutralStroke3 }} />
                  )}
                </React.Fragment>
              );
            })}
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <Button appearance="subtle" size="small" onClick={reset} disabled={step === 1 && turns.length === 1}>
            Reset
          </Button>
          <Button
            appearance="primary"
            size="medium"
            disabled={step < 4}
            onClick={create}
            style={{ backgroundColor: step >= 4 ? "#742774" : undefined }}
          >
            Create App IQ app
          </Button>
        </div>
      </div>

      {/* === 2-column body === */}
      <div style={{
        display: "grid",
        gridTemplateColumns: "1fr minmax(360px, 480px)",
        minHeight: 0,
        overflow: "hidden",
      }}>
        {/* --- Left: stepped conversation --- */}
        <div style={{
          backgroundColor: tokens.colorNeutralBackground2,
          display: "flex",
          flexDirection: "column",
          minHeight: 0,
          overflow: "hidden",
        }}>
          <div style={{ padding: "20px 32px 8px", borderBottom: `1px solid ${tokens.colorNeutralStroke3}` }}>
            <div style={{ fontSize: 11, fontWeight: tokens.fontWeightSemibold, color: "#742774", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 4 }}>
              Step {step} of 4 · {SCRATCH_STEPS[step - 1].label}
            </div>
            <div style={{ fontSize: 18, fontWeight: tokens.fontWeightSemibold, color: tokens.colorNeutralForeground1 }}>
              {step === 1 && "What should this app do?"}
              {step === 2 && "List its capabilities"}
              {step === 3 && "What data should it know about?"}
              {step === 4 && "Looks good?"}
            </div>
          </div>
          <div
            ref={bodyRef}
            style={{
              flex: 1,
              overflowY: "auto",
              padding: "20px 32px",
              display: "flex",
              flexDirection: "column",
              gap: 14,
            }}
          >
            {turns.map((t, i) => (
              <ChatTurn key={i} turn={t} />
            ))}
          </div>
          <div style={{
            flexShrink: 0,
            padding: "14px 24px 18px",
            borderTop: `1px solid ${tokens.colorNeutralStroke2}`,
            backgroundColor: tokens.colorNeutralBackground1,
            display: "flex",
            flexDirection: "column",
            gap: 6,
          }}>
            {step < 4 ? (
              <>
                <div style={{
                  display: "flex",
                  alignItems: "center",
                  gap: 8,
                  padding: "10px 12px",
                  border: `1.5px solid ${tokens.colorNeutralStroke1}`,
                  borderRadius: tokens.borderRadiusLarge,
                  backgroundColor: "#fff",
                  boxShadow: tokens.shadow2,
                }}>
                  <A.Comment20Regular style={{ color: "#742774", flexShrink: 0 }} />
                  <input
                    type="text"
                    value={draft}
                    onChange={(e) => setDraft(e.target.value)}
                    onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMaker(draft); } }}
                    placeholder={
                      step === 1 ? "Type your answer here, then press Enter…"
                      : step === 2 ? "List the capabilities — e.g. \"evaluate loans, route risky deals, draft letters\"…"
                      : "Mention tables, docs, APIs — or just describe what it should know…"
                    }
                    style={{
                      flex: 1,
                      border: "none",
                      outline: "none",
                      fontSize: 14,
                      fontFamily: "inherit",
                      backgroundColor: "transparent",
                      color: tokens.colorNeutralForeground1,
                      minWidth: 0,
                    }}
                    autoFocus
                  />
                  <Button
                    appearance="primary"
                    icon={<A.Send20Regular />}
                    onClick={() => sendMaker(draft)}
                    disabled={!draft.trim()}
                    style={{ backgroundColor: draft.trim() ? "#742774" : undefined, flexShrink: 0 }}
                    aria-label="Send"
                  >
                    Send
                  </Button>
                </div>
                <div style={{ fontSize: 11, color: tokens.colorNeutralForeground3, paddingLeft: 4 }}>
                  Press <kbd style={{ padding: "1px 5px", border: `1px solid ${tokens.colorNeutralStroke2}`, borderRadius: 3, fontSize: 10, fontFamily: "inherit" }}>Enter</kbd> to send · <kbd style={{ padding: "1px 5px", border: `1px solid ${tokens.colorNeutralStroke2}`, borderRadius: 3, fontSize: 10, fontFamily: "inherit" }}>Shift+Enter</kbd> for newline
                </div>
              </>
            ) : (
              <div style={{
                padding: "12px 14px",
                backgroundColor: "#f6f1f8",
                border: `1px solid ${tokens.colorNeutralStroke2}`,
                borderRadius: tokens.borderRadiusMedium,
                fontSize: 12,
                color: tokens.colorNeutralForeground2,
              }}>
                ✓ Conversation complete. Refine anything on the right, or hit <strong style={{ color: "#742774" }}>Create App IQ app</strong> at the top right to finish.
              </div>
            )}
          </div>
        </div>

        {/* --- Right: live preview of the App IQ app being built --- */}
        <ScratchPreviewPane app={draftApp} setApp={setDraftApp} step={step} />
      </div>
    </div>
  );
}

function ChatTurn({ turn }) {
  if (turn.from === "maker") {
    return (
      <div style={{
        alignSelf: "flex-end",
        maxWidth: "78%",
        padding: "10px 14px",
        backgroundColor: "#742774",
        color: "#fff",
        borderRadius: "16px 16px 4px 16px",
        fontSize: 14,
        lineHeight: 1.5,
        boxShadow: "0 2px 6px rgba(116,39,116,0.18)",
      }}>
        {turn.text}
      </div>
    );
  }
  return (
    <div style={{ alignSelf: "flex-start", maxWidth: "85%", display: "flex", gap: 10, alignItems: "flex-start" }}>
      <span style={{
        width: 28, height: 28, borderRadius: "50%",
        backgroundColor: "#f5f0fb", color: "#742774",
        display: "inline-flex", alignItems: "center", justifyContent: "center",
        flex: "none", marginTop: 2,
      }}>
        <IQBrandMark size={16} />
      </span>
      <div style={{
        padding: "10px 14px",
        backgroundColor: tokens.colorNeutralBackground1,
        border: `1px solid ${tokens.colorNeutralStroke2}`,
        borderRadius: "16px 16px 16px 4px",
        fontSize: 14,
        color: tokens.colorNeutralForeground1,
        lineHeight: 1.5,
      }}>
        {turn.text}
      </div>
    </div>
  );
}

/* Right pane — the App IQ app being built, sections light up as they fill. */
function ScratchPreviewPane({ app, setApp, step }) {
  const hasName     = !!app.name;
  const hasSkills   = app.skills.length > 0;
  const hasData     = app.tables.length > 0 || app.glossary.length > 0 || app.tools.length > 0;

  const EmptyHint = ({ text }) => (
    <div style={{ fontSize: 12, color: tokens.colorNeutralForeground3, fontStyle: "italic" }}>
      {text}
    </div>
  );
  const Section = ({ icon, title, active, count, children }) => (
    <div style={{
      backgroundColor: "#fff",
      border: `1px solid ${active ? "#742774" : tokens.colorNeutralStroke2}`,
      borderRadius: tokens.borderRadiusLarge,
      padding: "16px 18px",
      transition: "border-color 0.2s ease",
      opacity: active === false ? 0.6 : 1,
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
        <span style={{ color: "#742774", display: "inline-flex" }}>{icon}</span>
        <span style={{ fontSize: 13, fontWeight: tokens.fontWeightSemibold, color: tokens.colorNeutralForeground1 }}>{title}</span>
        {typeof count === "number" && count > 0 && (
          <span style={{ fontSize: 11, color: tokens.colorNeutralForeground3 }}>· {count}</span>
        )}
      </div>
      {children}
    </div>
  );

  return (
    <div style={{
      backgroundColor: "#fafafe",
      borderLeft: `1px solid ${tokens.colorNeutralStroke2}`,
      padding: "20px 24px 32px",
      overflowY: "auto",
      minHeight: 0,
      display: "flex",
      flexDirection: "column",
      gap: 12,
    }}>
      <div style={{ fontSize: 11, fontWeight: tokens.fontWeightSemibold, color: "#742774", textTransform: "uppercase", letterSpacing: "0.1em" }}>
        Your App IQ app
      </div>

      {/* Title row */}
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 4 }}>
        <span style={{
          width: 44, height: 44, borderRadius: 8,
          background: "linear-gradient(135deg, #5a2680 0%, #7c3aed 100%)",
          display: "inline-flex", alignItems: "center", justifyContent: "center",
          color: "#fff", flex: "none",
        }}>
          <IQBrandMark size={22} />
        </span>
        <div style={{ flex: 1, minWidth: 0 }}>
          {hasName ? (
            <Input
              value={app.name}
              onChange={(_, d) => setApp({ ...app, name: d.value })}
              style={{ width: "100%", fontSize: 16, fontWeight: 600 }}
            />
          ) : (
            <div style={{ fontSize: 16, fontWeight: tokens.fontWeightSemibold, color: tokens.colorNeutralForeground3 }}>
              App name appears after step 1
            </div>
          )}
          <div style={{ fontSize: 11, color: tokens.colorNeutralForeground3, marginTop: 4 }}>
            New draft · created just now
          </div>
        </div>
      </div>

      {/* Description */}
      <Section icon={<A.DocumentRegular />} title="Description" active={step === 1 ? true : undefined}>
        {hasName ? (
          <Textarea
            value={app.description}
            onChange={(_, d) => setApp({ ...app, description: d.value })}
            rows={3}
            resize="vertical"
            style={{ width: "100%" }}
          />
        ) : (
          <EmptyHint text="A one-sentence summary will land here after step 1." />
        )}
      </Section>

      {/* Skills */}
      <Section icon={<A.BrainCircuit20Regular />} title="Skills" count={app.skills.length} active={step === 2 ? true : undefined}>
        {hasSkills ? (
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {app.skills.map((sk) => (
              <div key={sk.name} style={{
                display: "grid",
                gridTemplateColumns: "auto 1fr",
                columnGap: 10,
                padding: "6px 0",
                fontSize: 13,
              }}>
                <span style={{ fontWeight: tokens.fontWeightSemibold, color: tokens.colorNeutralForeground1 }}>{sk.name}</span>
                <span style={{ color: tokens.colorNeutralForeground3, gridColumn: "1 / -1", fontSize: 12 }}>{sk.desc}</span>
              </div>
            ))}
          </div>
        ) : (
          <EmptyHint text="Skills land here after step 2." />
        )}
      </Section>

      {/* Semantic model — tables */}
      <Section icon={<A.Table20Regular />} title="Semantic model" count={app.tables.length} active={step === 3 ? true : undefined}>
        {app.tables.length > 0 ? (
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {app.tables.map((t) => (
              <Badge key={t} appearance="tint" color="brand"><A.Table16Regular style={{ marginRight: 4 }} /> {t}</Badge>
            ))}
          </div>
        ) : (
          <EmptyHint text="Tables land here after step 3." />
        )}
      </Section>

      {/* Glossary */}
      <Section icon={<A.BookOpen20Regular />} title="Glossary" count={app.glossary.length} active={step === 3 ? true : undefined}>
        {app.glossary.length > 0 ? (
          <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            {app.glossary.map((g) => (
              <div key={g.term} style={{ fontSize: 12, color: tokens.colorNeutralForeground2 }}>
                <strong style={{ color: tokens.colorNeutralForeground1 }}>{g.term}</strong> — {g.desc}
              </div>
            ))}
          </div>
        ) : (
          <EmptyHint text="Glossary terms land here after step 3." />
        )}
      </Section>

      {/* Tools */}
      <Section icon={<A.WrenchRegular />} title="Tools" count={app.tools.length} active={step === 3 ? true : undefined}>
        {app.tools.length > 0 ? (
          <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            {app.tools.map((tl) => (
              <div key={tl.name} style={{ fontSize: 12, color: tokens.colorNeutralForeground2 }}>
                <strong style={{ color: tokens.colorNeutralForeground1 }}>{tl.name}</strong>
                <span style={{ color: tokens.colorNeutralForeground3 }}> · {tl.kind}</span>
              </div>
            ))}
          </div>
        ) : (
          <EmptyHint text="Tools land here after step 3." />
        )}
      </Section>
    </div>
  );
}

/* ============================================================
   CREATE WIZARD
   ============================================================ */
function CreateWizard({ onCancel, onFinish }) {
  const s = useIQStyles();
  const [step, setStep] = React.useState(1);
  const [mode, setMode] = React.useState("builder");
  const [selectedApp, setSelectedApp] = React.useState(null);
  const [pluginName, setPluginName] = React.useState("Loan Processing");
  const [reviewTab, setReviewTab] = React.useState("data");
  const [learningEnabled, setLearningEnabled] = React.useState(true);
  const [autoRelations, setAutoRelations] = React.useState(true);

  const stepDot = (n, label) => {
    const active = n === step;
    const done = n < step;
    return (
      <span className={mergeClasses(s.stepDot, active && s.stepDotActive)}>
        <span className={mergeClasses(
          s.stepDotIdx,
          active && s.stepDotActiveIdx,
          done && s.stepDotDoneIdx,
        )}>
          {done ? <A.Checkmark12Regular /> : n}
        </span>
        {label}
      </span>
    );
  };

  return (
    <div className={s.wizardWrap}>
      <div className={s.wizardCard}>
        <div className={s.wizardStepper}>
          {stepDot(1, "Start from App")}
          <span className={s.stepConnector} />
          {stepDot(2, "App IQ Review")}
          <span className={s.stepConnector} />
          {stepDot(3, "App IQ Created")}
          <div style={{ flex: 1 }} />
          <RadioGroup
            layout="horizontal"
            value={mode}

          >

                  setSelectedApp(a);
                  setPluginName(a.title.split(" ")[0] + " Processing");
                }}
              />
            )}

            {step === 2 && (
              <WizardStep2
                sourceApp={selectedApp}
                pluginName={pluginName}
                setPluginName={setPluginName}
                tab={reviewTab}
                setTab={setReviewTab}
                learningEnabled={learningEnabled}

            {step === 3 && (

                pluginName={pluginName}
                learningEnabled={learningEnabled}
              />
            )}

            <div className={s.wizardFoot}>
              <Button appearance="subtle" onClick={onCancel}>Cancel</Button>
              <div className={s.wizardFootRight}>
                {step > 1 && step < 3 && (
                  <Button appearance="secondary" onClick={() => setStep(step - 1)} icon={<A.ChevronLeft16Regular />}>
                    Back
                  </Button>
                )}
                {step === 1 && (
                  <Button
                    appearance="primary"
                    disabled={!selectedApp}
                    onClick={() => setStep(2)}
                    icon={<A.ChevronRight16Regular />}
                    iconPosition="after"
                  >
                    Next: Review
                  </Button>
                )}
                {step === 2 && (
                  <Button
                    appearance="primary"
                    onClick={() => setStep(3)}
                    icon={<A.Sparkle16Regular />}
                  >
                    Create App IQ
                  </Button>
                )}
                {step === 3 && (
                  <Button
                    appearance="primary"
                    icon={<A.CheckmarkCircle16Regular />}
                    onClick={() => {
                      const id = "new-" + Date.now();
                      onFinish({
                        id,
                        name: pluginName,
                        sourceApp: selectedApp ? selectedApp.title : "—",
                        owner: "Eugene Behun",
                        ownerInitials: "EB",
                        stage: "Draft",
                        skills: REVIEW_DATA.skills.length,
                        lastActivity: "just now",
                        listings: [],
                        version: "v0.1.0",
                      });
                    }}
                  >
                    Done
                  </Button>
                )}
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function AppDetail({ app, tab, setTab, onChangeStage }) {
  const s = useIQStyles();
  const [selectedSkill, setSelectedSkill] = React.useState(null);
  const [selectedTrace, setSelectedTrace] = React.useState(null);
  const [selectedSuite, setSelectedSuite] = React.useState(null);
  // Domain Model — three sub-tabs per the Figma "Semantic models (preview)" surface:
  //   Overview (KPI tiles + generation signals + entry cards)
  //   Configuration (left-rail tables + right-pane Table/Relationships/Views sub-tabs)
  //   Glossary (terms list)
  // Domain Model navigation has two levels: list of models, then one model's detail
  // (Overview / Configuration / Glossary). Matches the PP "Semantic models (preview)"
  // surface — see Figma frames 1676:26230, 754:25335, 742:22430, 728:18243.
  const [domainScreen, setDomainScreen] = React.useState("list");      // list | detail
  const [activeModel, setActiveModel] = React.useState(null);          // selected SemanticModel object when in detail
  const [domainSub, setDomainSub] = React.useState("overview"); // overview | configuration | glossary
  const [configTable, setConfigTable] = React.useState("Account"); // selected table in Configuration left rail
  const [configSubTab, setConfigSubTab] = React.useState("table"); // table | relationships | views

  // Cross-tab navigation: jumping into a drilldown from elsewhere
  const openSkill = (skill) => {
    setSelectedTrace(null);
    setSelectedSuite(null);
    setSelectedSkill(skill || SKILLS[0]);
    setTab("skills");
  };
  const openTool = () => {
    setSelectedTrace(null);
    setTab("tools");
  };

  // When the user clicks a top tab, exit any open drilldown.
  const navigateTab = (value) => {
    if (value !== "skills") setSelectedSkill(null);
    if (value !== "activity") setSelectedTrace(null);
    if (value !== "evals") setSelectedSuite(null);
    setTab(value);
  };

  return (
    <>
      <header className={s.appHeader}>
        <div className={s.appHeaderId}>
          <span className={s.appHeaderAvatar}><A.AppGeneric20Filled /></span>
          <div className={s.appHeaderTitleWrap}>
            <h1 className={s.appHeaderTitle}>{app.name}</h1>
            <span className={s.appHeaderMeta}>
              from {app.sourceApp} · {app.version} · owner {app.owner}
            </span>
          </div>
        </div>
        <div />
        <div className={s.appHeaderActions}>
          <StatusDropdown app={app} onChangeStage={onChangeStage} />
          <Button appearance="primary" icon={<A.CloudArrowUp20Regular />}>
            Publish
          </Button>
        </div>
      </header>
      <div className={s.appHeaderTabsBar}>
        <TabList selectedValue={tab} onTabSelect={(_, d) => navigateTab(d.value)}>
          <Tab value="overview">Overview</Tab>
          <Tab value="skills">Business Skills</Tab>
          <Tab value="domain">Domain Model</Tab>
          <Tab value="tools">Tools</Tab>
          <Tab value="auto">Auto-Improvement</Tab>
          <Tab value="evals">Evals</Tab>
          <Tab value="activity">Activity</Tab>
          <Tab value="settings">Settings</Tab>
        </TabList>
      </div>

      <div className={s.appBody}>
        {tab === "overview" && <TabOverview app={app} setTab={navigateTab} openSkill={openSkill} />}
        {tab === "skills" && <TabSkills selected={selectedSkill} setSelected={setSelectedSkill} />}
        {tab === "domain" && domainScreen === "list" && (
          <SemanticModelsList
            onOpenModel={(m) => {
              setActiveModel(m);
              setDomainSub("overview");
              setDomainScreen("detail");
            }}
          />
        )}
        {tab === "domain" && domainScreen === "detail" && (
          <TabDomainModel
            modelName={activeModel ? activeModel.name : "Sales"}
            sub={domainSub}
            setSub={setDomainSub}
            configTable={configTable}
            setConfigTable={setConfigTable}
            configSubTab={configSubTab}
            setConfigSubTab={setConfigSubTab}
            onBackToList={() => setDomainScreen("list")}
          />
        )}
        {tab === "tools" && <TabTools />}
        {tab === "auto" && <TabAutoImprovement />}
        {tab === "evals" && <TabEvals selected={selectedSuite} setSelected={setSelectedSuite} openSkill={openSkill} />}
        {tab === "activity" && (
          <TabActivity
            selectedTrace={selectedTrace}
            setSelectedTrace={setSelectedTrace}
            openSkill={openSkill}
            openTool={openTool}
          />
        )}
        {tab === "settings" && <TabSettings />}
      </div>
    </>
  );
}

function TabDomainModel(props) {
  const {
    sub, setSub,
    configTable, setConfigTable,
    configSubTab, setConfigSubTab,
    modelName,
    onBackToList,
  } = props;
  const s = useIQStyles();
  const { designState } = useDesignState();
  const stateOverride = designState.domainState;
  const [signals, setSignals] = React.useState(
    DM_SM_SIGNALS.reduce((acc, sig) => { acc[sig.id] = sig.on; return acc; }, {})
  );
  const [tableState, setTableState] = React.useState(
    DM_SM_TABLES.reduce((acc, t) => { acc[t.name] = t.on; return acc; }, {})
  );
  const [savePending, setSavePending] = React.useState(false);
  const [bannerOpen, setBannerOpen] = React.useState(true);
  const [pendingNavTo, setPendingNavTo] = React.useState(null);    // Figma 1124:78359 "Save changes?" navigate-away modal
  const [regenModalOpen, setRegenModalOpen] = React.useState(false); // Figma 1450:24717 "Regeneration failed for these tables" modal
  const [viewportNarrow, setViewportNarrow] = React.useState(
    typeof window !== "undefined" ? window.innerWidth < 720 : false
  );
  React.useEffect(() => {
    if (typeof window === "undefined") return;
    const onResize = () => setViewportNarrow(window.innerWidth < 720);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  // Navigate to another sub-tab; if Save is pending, intercept with the modal first.
  const navigateToSub = (next) => {
    if (savePending && next !== sub) {
      setPendingNavTo(next);
    } else {
      setSub(next);
    }
  };
  const confirmSave = () => {
    setSavePending(false);
    if (pendingNavTo) {
      setSub(pendingNavTo);
      setPendingNavTo(null);
    }
  };
  const cancelSave = () => {
    setPendingNavTo(null);
  };

  const Toolbar = () => (
    <div className={s.ppToolbar} style={{ paddingLeft: 8, paddingRight: 16 }}>
      {onBackToList && (
        <Button
          appearance="subtle"
          size="small"
          icon={<A.ArrowLeft16Regular />}
          onClick={onBackToList}
          style={{ color: "#742774" }}
        >
          Back
        </Button>
      )}
      <span style={{
        width: 1,
        height: 18,
        backgroundColor: tokens.colorNeutralStroke2,
        margin: "0 12px",
        display: onBackToList ? "inline-block" : "none",
      }} />
      <span style={{ fontSize: 13, fontWeight: tokens.fontWeightSemibold, color: tokens.colorNeutralForeground1, marginRight: 12 }}>
        {modelName || "Sales"}
      </span>
      <div style={{ flex: 1 }} />
      <span style={{ fontSize: 12, color: tokens.colorNeutralForeground3, marginRight: 8 }}>
        Last regeneration: 4/15/2026 9:23 pm
      </span>
      <Button appearance="outline" size="small" icon={<A.ArrowSync16Regular />}>
        Regenerate
      </Button>
      <Button
        appearance="primary"
        size="small"
        disabled={!savePending}
        style={{ backgroundColor: savePending ? "#742774" : undefined, marginLeft: 8 }}
        onClick={() => setSavePending(false)}
      >
        Save
      </Button>
    </div>
  );

  const TabStrip = () => (
    <div style={{
      display: "flex",
      gap: 4,
      borderBottom: `1px solid ${tokens.colorNeutralStroke2}`,
      paddingLeft: 20,
      backgroundColor: tokens.colorNeutralBackground1,
    }}>
      {[
        { id: "overview", label: "Overview", icon: <A.GridDots20Regular /> },
        { id: "configuration", label: "Configuration", icon: <A.SlideTextRegular /> },
        { id: "glossary", label: "Glossary", icon: <A.BookOpen20Regular /> },
      ].map((t) => {
        const active = sub === t.id;
        return (
          <button
            key={t.id}
            onClick={() => navigateToSub(t.id)}
            style={{
              display: "inline-flex",
              alignItems: "center",
              gap: 6,
              padding: "12px 12px 10px",
              background: "transparent",
              border: "none",
              fontSize: 14,
              fontWeight: active ? tokens.fontWeightSemibold : tokens.fontWeightRegular,
              color: active ? "#742774" : tokens.colorNeutralForeground2,
              cursor: "pointer",
              borderBottom: active ? `2px solid #742774` : `2px solid transparent`,
              marginBottom: -1,
            }}
          >
            <span style={{ color: active ? "#742774" : tokens.colorNeutralForeground3 }}>{t.icon}</span>
            {t.label}
          </button>
        );
      })}
    </div>
  );

  // No-permission state per Figma frame 1676:26226 — replaces the entire surface.
  if (stateOverride === "noPermission") {
    return (
      <div style={{ margin: "-24px -32px -48px", padding: "120px 32px", textAlign: "center", backgroundColor: tokens.colorNeutralBackground1, minHeight: 560 }}>
        <Toolbar />
        <TabStrip />
        <div style={{ padding: "100px 32px", textAlign: "center" }}>
          <div style={{ display: "inline-flex", width: 96, height: 96, borderRadius: "50%", backgroundColor: tokens.colorNeutralBackground3, color: tokens.colorNeutralForeground2, alignItems: "center", justifyContent: "center", marginBottom: 16 }}>
            <A.LockClosed20Regular style={{ width: 36, height: 36 }} />
          </div>
          <div style={{ fontSize: 16, color: tokens.colorNeutralForeground1, marginBottom: 6 }}>
            You don't have permission to view this page.
          </div>
          <div style={{ fontSize: 13, color: tokens.colorNeutralForeground3 }}>
            Contact your administrator to request access.
          </div>
        </div>
      </div>
    );
  }

  // Page-level error replaces all sub-tab content per Figma frame 1444:554986.
  if (stateOverride === "error") {
    return (
      <div style={{ margin: "-24px -32px -48px" }}>
        <Toolbar />
        <TabStrip />
        <div style={{ padding: "120px 32px", textAlign: "center", backgroundColor: tokens.colorNeutralBackground2, minHeight: 500 }}>
          <div style={{ display: "inline-block", width: 96, height: 96, borderRadius: "50%", backgroundColor: tokens.colorNeutralBackground3, marginBottom: 16, position: "relative" }}>
            <span style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 36, color: tokens.colorNeutralForeground2 }}>!</span>
          </div>
          <div style={{ fontSize: 16, color: tokens.colorNeutralForeground1, marginBottom: 20 }}>
            Something went wrong while loading your semantic model
          </div>
          <Button appearance="primary" size="medium" icon={<A.ArrowSync16Regular />} style={{ backgroundColor: "#742774" }}>
            Try again
          </Button>
        </div>
      </div>
    );
  }
  if (stateOverride === "loading") {
    return (
      <div style={{ margin: "-24px -32px -48px" }}>
        <Toolbar />
        <TabStrip />
        <div style={{ padding: 32 }}>
          <div className={s.sk} style={{ height: 80, marginBottom: 16 }} />
          <div className={s.sk} style={{ height: 160 }} />
        </div>
      </div>
    );
  }

  return (
    <div style={{ margin: "-24px -32px -48px" }}>
      <Toolbar />

      {/* Optional alert banner — Figma Overview frame shows it above the tab strip. */}
      {sub === "overview" && bannerOpen && (
        <div style={{
          display: "flex",
          alignItems: "center",
          gap: 8,
          padding: "8px 16px",
          backgroundColor: tokens.colorPaletteYellowBackground1,
          borderBottom: `1px solid ${tokens.colorPaletteYellowBorderActive}`,
          fontSize: 12,
          color: tokens.colorNeutralForeground1,
        }}>
          <A.Warning16Filled style={{ color: tokens.colorPaletteYellowForeground1 }} />
          <span style={{ fontWeight: tokens.fontWeightSemibold }}>Last regeneration failed for some tables</span>
          <span>New metadata was not able to be regenerated for 2 of 50 tables.</span>
          <Link style={{ color: "#742774", cursor: "pointer" }} onClick={() => setRegenModalOpen(true)}>View list</Link>
          <div style={{ flex: 1 }} />
          <Button appearance="subtle" size="small" icon={<A.Dismiss16Regular />} onClick={() => setBannerOpen(false)} aria-label="Dismiss" />
        </div>
      )}

      <TabStrip />

      {sub === "overview" && (
        <OverviewView
          signals={signals}
          toggleSignal={(id) => { setSignals({ ...signals, [id]: !signals[id] }); setSavePending(true); }}
          onOpenConfiguration={() => setSub("configuration")}
          onOpenGlossary={() => setSub("glossary")}
          stateOverride={stateOverride}
        />
      )}
      {sub === "configuration" && (
        <ConfigurationView
          tables={DM_SM_TABLES}
          tableState={tableState}
          setTableState={(name, val) => { setTableState({ ...tableState, [name]: val }); setSavePending(true); }}
          selectedTable={configTable}
          setSelectedTable={setConfigTable}
          subTab={configSubTab}
          setSubTab={setConfigSubTab}
          stateOverride={stateOverride}
          onSavePending={() => setSavePending(true)}
          viewportNarrow={viewportNarrow}
        />
      )}
      {sub === "glossary" && (
        <div className={s.ppBody}>
          <h1 className={s.ppTitle}>Glossary</h1>
          <GlossaryView />
        </div>
      )}

      {/* Figma 1124:78359 — "Save changes?" navigate-away modal. */}
      {pendingNavTo && (
        <SemanticModal
          title="Save changes?"
          body="Changes need to be saved before navigating away. Ready to save?"
          primaryLabel="Save"
          onPrimary={confirmSave}
          secondaryLabel="Cancel"
          onSecondary={cancelSave}
          onDismiss={cancelSave}
        />
      )}

      {/* Figma 1450:24717 — "Regeneration failed for these tables" modal. */}
      {regenModalOpen && (
        <SemanticModal
          title="Regeneration failed for these tables"
          onDismiss={() => setRegenModalOpen(false)}
          primaryLabel="Try again"
          onPrimary={() => setRegenModalOpen(false)}
          secondaryLabel="Cancel"
          onSecondary={() => setRegenModalOpen(false)}
          primaryIcon={<A.ArrowSync16Regular />}
        >
          <div style={{ fontSize: 12, color: tokens.colorNeutralForeground2, marginBottom: 8 }}>
            <strong>Regeneration time:</strong> 6/2/2026 10:00 pm
          </div>
          <ul style={{ margin: "0 0 8px 18px", padding: 0, fontSize: 13, color: tokens.colorNeutralForeground1, lineHeight: 1.7 }}>
            <li>Account</li>
            <li>Contact</li>
          </ul>
        </SemanticModal>
      )}
    </div>
  );
}

/* Figma modal pattern: white card (380px wide), title row with close,
   optional children body, two-button footer (primary purple + cancel). */
function SemanticModal({ title, body, children, primaryLabel, onPrimary, secondaryLabel, onSecondary, onDismiss, primaryIcon }) {
  return (
    <div
      role="dialog"
      aria-modal="true"
      style={{
        position: "fixed",
        inset: 0,
        backgroundColor: "rgba(0,0,0,0.32)",
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        zIndex: 100,
      }}
      onClick={onDismiss}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          backgroundColor: "#fff",
          borderRadius: 8,
          boxShadow: "0 8px 24px rgba(0,0,0,0.18)",
          minWidth: 360,
          maxWidth: 440,
          padding: "20px 24px 20px",
        }}
      >
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
          <span style={{ fontSize: 16, fontWeight: tokens.fontWeightSemibold, color: tokens.colorNeutralForeground1 }}>{title}</span>
          <Button appearance="subtle" size="small" icon={<A.Dismiss16Regular />} onClick={onDismiss} aria-label="Close" />
        </div>
        {body && (
          <div style={{ fontSize: 13, color: tokens.colorNeutralForeground2, lineHeight: 1.55, marginBottom: 18 }}>
            {body}
          </div>
        )}
        {children}
        <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 12 }}>
          {primaryLabel && (
            <Button appearance="primary" icon={primaryIcon} onClick={onPrimary} style={{ backgroundColor: "#742774" }}>
              {primaryLabel}

          )}
          {secondaryLabel && (
            <Button appearance="secondary" onClick={onSecondary}>
              {secondaryLabel}
            </Button>
          )}
        </div>
      </div>
    </div>
  );
}

/* --- Domain Model — Glossary sub-view ---
   Term / Definition / Owner table, with link-back chips to Concepts where
   a term maps to a defined concept. Mirrors PP's Semantic Model glossary surface. */
function GlossaryView() {
  // Designed to mirror the Figma "Glossary" section frames:
  //  - Lede: "Define your business' vocabulary to help Copilot and agents understand the way your business talks."
  //  - Columns: Term · Description · Added by   (Agent vs Teammate — Figma frame "Added by column")
  //  - Empty state: "No glossary terms yet" + "Example terms" inspiration block + Copilot/agents help line
  //  - Per-row hover actions: Turn off / Turn on (terms can be hidden), Edit (inline), Delete (with confirm)
  //  - Create flow: inline text inputs in a new row (Figma "Preferred"), NOT a drawer (Figma "Not Preferred")
  const s = useIQStyles();
  const { designState } = useDesignState();
  const stateOverride = designState.glossaryState;
  const [terms, setTerms] = React.useState(DM_GLOSSARY_TERMS);
  const [checked, setChecked] = React.useState({});
  const [q, setQ] = React.useState("");
  const [hovered, setHovered] = React.useState(null);
  const [editingTerm, setEditingTerm] = React.useState(null);          // term name currently being edited inline
  const [editDraft, setEditDraft] = React.useState({ term: "", description: "" });
  const [confirmDelete, setConfirmDelete] = React.useState(null);     // term name pending delete confirm
  const [creating, setCreating] = React.useState(false);              // inline create row visible
  const [createDraft, setCreateDraft] = React.useState({ term: "", description: "" });

  if (stateOverride === "loading") {
    return (
      <div className={s.panel}>
        <div className={s.panelBody}>
          <div className={s.sk} style={{ marginBottom: 12 }} />
          <div className={s.sk} style={{ width: "60%" }} />
        </div>
      </div>
    );
  }
  if (stateOverride === "error") {
    return (
      <MessageBar intent="error">
        <MessageBarBody>
          <MessageBarTitle>Couldn't load glossary</MessageBarTitle>
          Try refresh, or import a CSV/markdown glossary while we restore.
        </MessageBarBody>
      </MessageBar>
    );
  }
  const isEmpty = stateOverride === "empty";
  const visibleTerms = isEmpty ? [] : terms;
  const filtered = visibleTerms.filter(
    (t) => !q ||
      t.term.toLowerCase().includes(q.toLowerCase()) ||
      t.description.toLowerCase().includes(q.toLowerCase())
  );
  const checkedTerms = Object.keys(checked).filter((k) => checked[k]);
  const selectionCount = checkedTerms.length;
  const toggleCheck = (term) => setChecked((c) => ({ ...c, [term]: !c[term] }));

  // Sub-actions
  const turnOff = (name) => setTerms((ts) => ts.map((x) => x.term === name ? { ...x, active: false } : x));
  const turnOn = (name) => setTerms((ts) => ts.map((x) => x.term === name ? { ...x, active: true } : x));
  const startEdit = (t) => { setEditingTerm(t.term); setEditDraft({ term: t.term, description: t.description }); };
  const saveEdit = () => {
    setTerms((ts) => ts.map((x) => x.term === editingTerm ? { ...x, term: editDraft.term, description: editDraft.description } : x));
    setEditingTerm(null);
  };
  const doDelete = (name) => { setTerms((ts) => ts.filter((x) => x.term !== name)); setConfirmDelete(null); };
  const saveCreate = () => {
    if (!createDraft.term || !createDraft.description) return;
    setTerms((ts) => [{ term: createDraft.term, description: createDraft.description, addedBy: { type: "Teammate", name: "Eugene Behun" }, active: true }, ...ts]);
    setCreateDraft({ term: "", description: "" });
    setCreating(false);
  };

  return (
    <>
      {/* Figma-aligned lede above the table. */}
      <p style={{
        fontSize: 13,
        color: tokens.colorNeutralForeground2,
        lineHeight: 1.5,
        marginTop: 0,
        marginBottom: 16,
        maxWidth: 760,
      }}>
        Define your business' vocabulary to help Copilot and agents understand the way your business talks.
      </p>

      <div style={{ display: "flex", gap: 12, alignItems: "center", marginBottom: 12 }}>
        <Input
          placeholder="Search terms or descriptions…"
          value={q}
          onChange={(_, d) => setQ(d.value)}
          contentBefore={<A.Search16Regular />}
          style={{ maxWidth: 360 }}
        />
        <span style={{ fontSize: 12, color: tokens.colorNeutralForeground3 }}>
          {filtered.length} of {terms.length} terms
        </span>
        <div style={{ flex: 1 }} />
        {!creating && !isEmpty && (
          <Button
            appearance="primary"
            icon={<A.Add16Regular />}
            onClick={() => setCreating(true)}
            style={{ backgroundColor: "#742774" }}
          >
            Add term
          </Button>
        )}
      </div>

      {selectionCount > 0 && (
        <div
          style={{
            display: "flex", alignItems: "center", gap: 12,
            padding: "8px 16px",
            backgroundColor: "#f5f0fb",
            border: `1px solid #742774`,
            borderRadius: tokens.borderRadiusMedium,
            marginBottom: 12,
          }}
        >
          <span style={{ fontSize: 13, fontWeight: tokens.fontWeightSemibold, color: "#742774" }}>
            {selectionCount} selected
          </span>
          <span style={{ width: 1, height: 20, backgroundColor: "#742774", opacity: 0.3 }} />
          <button className={s.ppCmd}><A.EyeOff16Regular /> Turn off</button>
          <button className={s.ppCmd}><A.ArrowDownload16Regular /> Export</button>
          <button className={s.ppCmd}><A.DeleteRegular /> Delete</button>
          <div style={{ flex: 1 }} />
          <button className={s.ppCmd} onClick={() => setChecked({})}>
            <A.DismissRegular /> Clear selection
          </button>
        </div>
      )}

      <div className={s.panel}>
        <div className={s.panelBodyTight}>
          {isEmpty || (filtered.length === 0 && !creating) ? (
            // Empty state per Figma frame "Empty state" / "Empty / Term focus".
            <div style={{ padding: "48px 32px" }}>
              <div style={{ maxWidth: 540, margin: "0 auto", textAlign: "center" }}>
                <div style={{ color: "#742774", marginBottom: 16, display: "inline-flex" }}>
                  <A.BookOpen20Regular style={{ width: 40, height: 40 }} />
                </div>
                <div style={{ fontSize: 18, fontWeight: tokens.fontWeightSemibold, marginBottom: 6, color: tokens.colorNeutralForeground1 }}>

                const rowStyle = {
                  gridTemplateColumns: "32px 1fr 2.4fr 1.2fr 120px",

                        value={editDraft.description}

                          <span style={{ color: tokens.colorNeutralForeground3 }}>· {t.addedBy.name}</span>

                            display: "inline-flex", alignItems: "center", justifyContent: "center",

                            backgroundColor: tokens.colorBrandBackground, color: "#fff",
                            fontSize: 10, fontWeight: tokens.fontWeightSemibold,
                          }}>
                            {t.addedBy.name.split(" ").map((x) => x[0]).join("").slice(0, 2)}
                          </span>
                          <span>{t.addedBy.name}</span>
                        </>
                      )}
                    </span>

                    {/* Hover-revealed action row: Turn on/off · Edit · Delete (Figma hover frames). */}
                    <span style={{
                      display: "inline-flex",
                      justifyContent: "flex-end",
                      gap: 2,
                      opacity: isEditing || isDeleting || isHover ? 1 : 0,
                      transition: "opacity 0.1s ease",
                    }}>
                      {isEditing ? (
                        <>
                          <Button
                            size="small"
                            appearance="primary"
                            style={{ backgroundColor: "#742774" }}

                          >
                            Save
                          </Button>

                            Cancel
                          </Button>
                        </>
                      ) : isDeleting ? (
                        // Figma "Delete • Confirm" — inline confirmation, not a modal.
                        <>
                          <span style={{ fontSize: 12, color: tokens.colorPaletteRedForeground1, alignSelf: "center", marginRight: 6 }}>
                            Delete?
                          </span>
                          <Button
                            size="small"
                            appearance="primary"
                            style={{ backgroundColor: tokens.colorPaletteRedForeground1 }}

                          >
                            Yes
                          </Button>
                          <Button size="small" appearance="subtle" onClick={() => setConfirmDelete(null)}>
                            No
                          </Button>
                        </>
                      ) : (
                        <>
                          {t.active ? (
                            <Tooltip content="Turn off (hide from Copilot)" relationship="label">

                                size="small"
                                appearance="subtle"
                                icon={<A.EyeOff16Regular />}

  const bodyRef = React.useRef(null);

  React.useEffect(() => {
    if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
  }, [phase, selectedApp]);

  return (
    <>
      <div ref={bodyRef} className={s.convoBody}>
        <div className={s.msgAgent}>
          <div className={s.msgAgentHead}><IQBrandMark size={16} /> App IQ</div>
          Hey, I'll build App IQ from one of your existing Power Platform apps.
          Which app do you want me to learn from?
          <div className={s.convoChoiceList}>
            {SOURCE_APPS.map((a) => (
              <div
                key={a.id}
                className={s.convoChoice}
                onClick={() => { setSelectedApp(a); setPhase(Math.max(phase, 2)); }}
                tabIndex={0}
                role="button"
              >
                <span>
                  <strong>{a.title}</strong>
                  <span style={{ color: tokens.colorNeutralForeground3 }}> — {a.type}, {a.tables} tables</span>
                </span>
                {selectedApp && selectedApp.id === a.id
                  ? <A.CheckmarkCircle16Filled style={{ color: tokens.colorPaletteGreenForeground2 }} />
                  : <A.ArrowRight16Regular style={{ color: tokens.colorNeutralForeground3 }} />}
              </div>
            ))}
          </div>
        </div>

        {selectedApp && (
          <div className={s.msgUser}>Let's use <strong>{selectedApp.title}</strong>.</div>
        )}

        {phase >= 2 && selectedApp && (
          <div className={s.msgAgent}>
            <div className={s.msgAgentHead}><IQBrandMark size={16} /> App IQ</div>
            Here's what I found in <strong>{selectedApp.title}</strong>:
            <ul style={{ margin: "8px 0 0 18px", lineHeight: 1.7, fontSize: tokens.fontSizeBase200 }}>
              <li>{REVIEW_DATA.data.length} tables (Loans, Borrowers, Collateral, Payments) — each cited to a policy doc</li>
              <li>{REVIEW_DATA.connections.length} connections (Dataverse, Outlook, Credit Bureau API, Document Generation)</li>
              <li>{REVIEW_DATA.resources.length} resources registered from source app</li>
              <li>{REVIEW_DATA.skills.length} candidate skills (Evaluate Loan Application, Generate Approval Letter, Route Red File)</li>
              <li>1,248 records available to validate Learning against</li>
            </ul>
            <div style={{ marginTop: 10, display: "flex", gap: 8 }}>
              <Button size="small" appearance="primary" onClick={() => setPhase(Math.max(phase, 3))}>Looks good</Button>
              <Button size="small" onClick={onSwitchToBuilder}>Open Builder to deselect</Button>
            </div>
          </div>
        )}

        {phase >= 3 && (
          <div className={s.msgUser}>Looks good.</div>
        )}

        {phase >= 3 && (
          <div className={s.msgAgent}>
            <div className={s.msgAgentHead}><IQBrandMark size={16} /> App IQ</div>
            What should I name your App IQ app? I suggested <strong>{pendingName}</strong>.
            <div style={{ marginTop: 10, display: "flex", gap: 8 }}>
              <Input
                value={pendingName}
                onChange={(_, d) => setPendingName(d.value)}
                style={{ flex: 1 }}
              />
              <Button
                appearance="primary"
                icon={<A.Sparkle16Regular />}
                onClick={() => { setPluginName(pendingName); setPhase(4); }}
              >
                Create
              </Button>
            </div>
          </div>
        )}

        {phase >= 4 && (
          <>
            <div className={s.msgUser}>Create.</div>
            <div className={s.msgAgent}>
              <div className={s.msgAgentHead}><IQBrandMark size={16} /> App IQ</div>
              <strong>{pendingName}</strong> is ready. I'll keep monitoring {selectedApp.title} for changes.
              <div style={{ marginTop: 10 }}>
                <Button appearance="primary" icon={<A.CheckmarkCircle16Regular />} onClick={onFinish}>
                  Open my new app
                </Button>
              </div>
            </div>
          </>
        )}
      </div>
      <div className={s.convoInputRow}>
        <Button appearance="subtle" onClick={onCancel}>Cancel</Button>
        <div style={{ flex: 1 }} />

  );
}

function App() {
  const s = useStyles();
  const [tab, setTab] = React.useState("overview");
  const [railActive, setRailActive] = React.useState("agents");
  const [view, setView] = React.useState("power-platform");
  const [showTest, setShowTest] = React.useState(false);

  if (view === "agent-builder" && window.AgentBuilderView) {
    return <window.AgentBuilderView onSwitchView={setView} />;
  }
  if (view === "cowork" && window.CoworkView) {
    return <window.CoworkView onSwitchView={setView} />;
  }
  if (view === "power-platform" && window.PowerPlatformView) {
    return <window.PowerPlatformView onSwitchView={setView} />;
  }
  if (view === "copilot-studio-v2" && window.CopilotStudioV2View) {
    return <window.CopilotStudioV2View onSwitchView={setView} />;
  }

  return (
    <FluentProvider theme={webLightTheme} style={{ height: "100vh" }}>
      <div className={s.page}>
        <TopBar onSwitchView={setView} />
        <div
          className={s.shell}
          style={{ gridTemplateColumns: showTest ? "64px 1fr 320px" : "64px 1fr" }}
        >
          <Rail active={railActive} setActive={setRailActive} />
          <main className={s.main}>
            <AgentHeader tab={tab} setTab={setTab} onTest={() => setShowTest((v) => !v)} />
            <div className={s.content}>
              <DetailsCard />
              <ModelCard />
              <InstructionsCard />
              <MicrosoftIQCard />
            </div>
          </main>
          {showTest && <TestPanel onClose={() => setShowTest(false)} />}
        </div>
      </div>
    </FluentProvider>
  );
}

const mount = () => {
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
};

if (window.Fluent && window.FluentIcons) {
  mount();
} else {
  window.__fluentReady = mount;
}

</script>

<!-- Bootstrap: load React + Fluent, expose globally, transpile + run the
     inlined sources, then let the App router (app.jsx) self-mount. The router
     holds the active-view state and wires the app-launcher switcher across
     Power Platform / Agent Builder / CoWork / Copilot Studio. -->
<script type="module">
  try {
    const React          = (await import("react")).default;
    const ReactDOMClient = await import("react-dom/client");
    const Fluent         = await import("@fluentui/react-components");
    const FluentIcons    = await import("@fluentui/react-icons");

    window.React = React;
    window.ReactDOM = ReactDOMClient;
    window.Fluent = Fluent;
    window.FluentIcons = FluentIcons;

    // Order matters: view components must be on `window` before app.jsx
    // (last) runs and self-mounts the <App/> router.
    for (const id of ["src-agent-builder", "src-cowork", "src-copilot-studio-v2", "src-app-iq", "src-power-platform", "src-app"]) {
      const src = document.getElementById(id).textContent;
      const out = Babel.transform(src, { presets: ["env", "react"] }).code;
      // eslint-disable-next-line no-new-func
      new Function(out)();
    }

    document.getElementById("splash")?.remove();
  } catch (e) {
    document.getElementById("splash")?.remove();
    const el = document.getElementById("cdnerr");
    el.style.display = "flex";
    el.innerHTML = "<div><b>Couldn't load the prototype libraries.</b><br/>This file needs internet access to esm.sh and unpkg.<br/>If you're on a restricted network, ask Eugene for the fully-offline build.<br/><br/><small>" + (e && e.message ? e.message : e) + "</small></div>";
  }
</script>
</head>
<body>
  <div id="splash"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span>Loading App IQ…</span></div>
  <div id="cdnerr"></div>
  <div id="root"></div>
</body>
</html>
